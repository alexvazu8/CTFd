version: '3'

services:
  ctfd:
    build: .
    user: root
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=postgresql://ctfd_60yr_user:TU_CONTRASEÑA@dpg-d2ev9iqdbo4c738tr8pg-a.oregon-postgres.render.com/ctfd_60yr  # ✔️ Usa tu URL de Render
      - REDIS_URL=redis://cache:6379  # ✔️ Opcional: Si usas Redis local
      - SECRET_KEY=tu_clave_secreta_generada  # ✔️ Añade esto (usa `openssl rand -hex 32`)
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - .data/CTFd/logs:/var/log/CTFd
      - .data/CTFd/uploads:/var/uploads
      - .:/opt/CTFd:ro
    depends_on:
      - cache  # ✔️ Solo si usas Redis local
    networks:
      default:
      internal:

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      - ctfd
    networks:
      default:

  cache:
    image: redis:4
    restart: always
    volumes:
      - .data/redis:/data
    networks:
      internal:

networks:
  default:
  internal:
    internal: true